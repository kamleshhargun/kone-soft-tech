<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Cutting & Stitching Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, sans-serif }
        body { background: #f5f3ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #1f2937; padding: 15px; }
        .main-container { width: 100%; max-width: 650px; }
        .header { text-align: center; font-size: 20px; font-weight: 800; color: #7c3aed; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        .panel { background: #fff; border: 1px solid #ddd6fe; border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(124, 58, 237, .06) }
        
        .panel-header { padding: 14px 16px; font-weight: 700; font-size: 14px; background: #faf5ff; border-bottom: 1px solid #f3e8ff; display: flex; align-items: center; justify-content: space-between; color: #581c87; }
        .header-title-text { font-size: 13px; font-weight: 800; text-transform: uppercase; color: #6b21a8; }
        .badge-wrapper { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; font-size: 12px; background: #ffffff; padding: 4px 10px; border-radius: 20px; border: 1px solid #e9d5ff; }
        .header-circle-count { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 26px; padding: 0 6px; border-radius: 50%; font-size: 11px; font-weight: 700; color: #fff; }
        .circle-pickup { background: #7c3aed; }
        .circle-return { background: #059669; }

        .center-content { padding: 20px; display: flex; flex-direction: column; gap: 14px }
        .mode-row, .action-row { display: flex; gap: 10px }
        .mode-btn { flex: 1; height: 50px; border-radius: 12px; border: 2px solid; font-weight: 700; background: #fff; cursor: pointer; transition: .2s; font-size: 14px; }
        .pickup { border-color: #7c3aed; color: #7c3aed }
        .return { border-color: #059669; color: #059669 }
        .active-pickup { background: #7c3aed; color: #fff }
        .active-return { background: #059669; color: #fff }
        .scan-panel { display: none; flex-direction: column; gap: 12px; padding: 16px; border: 1px solid #ebd5ff; border-radius: 14px; background: #fcfaff }
        
        .input, .select { height: 46px; padding: 0 14px; border: 1px solid #d8b4fe; border-radius: 12px; outline: none; background: #fff; font-size: 14px; width: 100%; font-weight: 600; color: #1e293b; }
        .input:focus, .select:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124, 58, 237, .12) }
        
        /* Floating Smart Search Dropdown */
        .search-results-box { max-height: 180px; overflow-y: auto; z-index: 50; position: absolute; left:0; right:0; top:100%; background:#fff; border:1px solid #d8b4fe; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); margin-top:4px; }
        .search-item { padding: 10px 14px; font-size: 12px; font-weight: 700; color: #4c1d95; cursor: pointer; border-bottom: 1px solid #f3e8ff; }
        .search-item:hover { background: #f5f3ff; color: #7c3aed; }

        .pending-list-box { display: flex; flex-direction: column; gap: 8px; max-height: 180px; overflow-y: auto; background: #faf5ff; padding: 10px; border-radius: 12px; border: 1px solid #e9d5ff; }
        .pending-item-card { background: #ffffff; border: 1px solid #cbd5e1; padding: 10px 12px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .pending-item-card.selected { border-color: #059669; background: #d1fae5; }

        .btn { border: none; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s; text-align: center; }
        .btn-save { background: #059669; color: #fff }
        .btn-stop { background: #ef4444; color: #fff }

        .table-panel { margin-top: 15px; padding: 16px; background: #fff; border: 1px solid #e9d5ff; border-radius: 18px; box-shadow: 0 4px 15px rgba(124, 58, 237, .04); }
        .table-wrapper { overflow-x: auto; max-height: 320px; border-radius: 12px; border: 1px solid #e9d5ff; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; }
        th { background: #faf5ff; padding: 10px 12px; font-weight: 700; color: #581c87; border-bottom: 1px solid #e9d5ff; position: sticky; top: 0; }
        td { padding: 10px 12px; border-bottom: 1px solid #f3e8ff; font-weight: 600; }
        .status-badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .badge-pending { background: #fef3c7; color: #b45309; }
        .badge-received { background: #d1fae5; color: #065f46; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111827; color: #fff; padding: 12px 16px; border-radius: 12px; z-index: 9999; }
        #loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, .85); backdrop-filter: blur(4px); z-index: 99999; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #7c3aed }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="header">✂️ CUTTING & STITCHING MANAGER</div>

        <div class="panel">
            <div class="panel-header">
                <div class="badge-wrapper" style="color: #7c3aed;">
                    Pending <span id="headerIssueCount" class="header-circle-count circle-pickup">0</span>
                </div>
                <div class="header-title-text">Cutting Operations</div>
                <div class="badge-wrapper" style="color: #059669;">
                    Received <span id="headerReceiveCount" class="header-circle-count circle-return">0</span>
                </div>
            </div>

            <div class="center-content">
                <div class="mode-row">
                    <button id="issueBtn" class="mode-btn pickup" onclick="selectMode('Issue')">✂️ Cutting Issue</button>
                    <button id="receiveBtn" class="mode-btn return" onclick="selectMode('Receive')">📦 Stitched Received</button>
                </div>

                <div id="workPanel" class="scan-panel">
                    <div>
                        <label style="font-size:11px; font-weight:700; color:#581c87; margin-bottom:4px; display:block;">LABOUR NAME</label>
                        <select id="labourSelect" class="select" onchange="handleLabourChange()">
                            <option value="">-- Select Labour --</option>
                        </select>
                    </div>

                    <div id="pendingCuttingWrapper" style="display: none;">
                        <label style="font-size:11px; font-weight:700; color:#d97706; margin-bottom:4px; display:block;">SELECT PENDING CUTTING BATCH</label>
                        <div id="pendingCuttingBox" class="pending-list-box">
                            <div style="font-size: 12px; color: #94a3b8; text-align: center; padding: 10px;">Select labour to view pending cuttings</div>
                        </div>
                    </div>

                    <div style="position: relative;">
                        <label style="font-size:11px; font-weight:700; color:#581c87; margin-bottom:4px; display:block;">PRODUCT SKU (ADVANCED SEARCH)</label>
                        <input id="skuSearchInput" type="text" class="input" onkeyup="handleSkuFuzzySearch()" onfocus="handleSkuFuzzySearch()" placeholder="Type SKU e.g. JPR101 or Pink..." autocomplete="off">
                        <input id="selectedSkuVal" type="hidden">
                        <div id="skuDropdownContainer" class="search-results-box" style="display:none;"></div>
                        <input id="skuReadOnly" class="input" readonly style="display: none; background: #f1f5f9;" placeholder="SKU Locked">
                    </div>

                    <div>
                        <label style="font-size:11px; font-weight:700; color:#581c87; margin-bottom:4px; display:block;">QUANTITY (PCS)</label>
                        <input id="qtyInput" type="number" class="input" placeholder="Enter Qty" min="1">
                        <small id="qtyLimitHint" style="color: #ef4444; font-size: 11px; font-weight: 700; display: none; margin-top: 2px;">Max allowed: <span id="maxQtyVal">0</span> Pcs</small>
                    </div>

                    <div class="action-row" style="margin-top: 5px;">
                        <button class="btn btn-save" style="flex: 1;" onclick="saveCuttingEntry()">Next (Save)</button>
                        <button class="btn btn-stop" style="flex: 1;" onclick="stopWork()">Stop</button>
                    </div>

                </div>
            </div>
        </div>

        <div class="table-panel">
            <div style="font-size: 12px; font-weight: 800; color: #581c87; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span>📋 Cutting Ledger Directory</span>
                <span style="font-size: 10px; color: #7c3aed; font-weight: 700;">Pending Cuttings First</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Labour</th>
                            <th>SKU</th>
                            <th>Issued</th>
                            <th>Received</th>
                            <th>Balance</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="masterTableBody">
                        <tr><td colspan="7" style="text-align: center; padding: 15px; color: #94a3b8;">Loading records...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="loadingOverlay">Processing, please wait...</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzVwBYD6HH8zPtUcRgy3kn2_4y-77ity3BeM3mWDgffaiA_qLvZ2VXvjxck76kn04mr/exec"; 

        let currentMode = "";
        let masterPendingRows = [];
        let selectedPendingRow = null;
        let masterProductsList = [];

        window.onload = function() {
            loadInitialDropdowns();
            fetchMasterTableData();

            document.addEventListener("click", function(e) {
                if (!e.target.closest("#skuSearchInput") && !e.target.closest("#skuDropdownContainer")) {
                    document.getElementById("skuDropdownContainer").style.display = "none";
                }
            });
        };

        async function loadInitialDropdowns() {
            try {
                const [lResp, pResp] = await Promise.all([
                    fetch(`${API_URL}?action=getLabourNames`),
                    fetch(`${API_URL}?action=inventoryProducts`)
                ]);

                const lData = await lResp.json();
                const pData = await pResp.json();

                if (lData.success && lData.names) {
                    const opts = '<option value="">-- Select Labour --</option>' + lData.names.map(n => `<option value="${n}">${n}</option>`).join('');
                    document.getElementById("labourSelect").innerHTML = opts;
                }

                if (pData.success && pData.products) {
                    masterProductsList = pData.products.map(p => String(p.sku || "").trim()).filter(Boolean);
                }
            } catch (e) {}
        }

        /* FUZZY NORMALIZED SKU SEARCH */
        function normalizeSKU(str) { return String(str || "").toLowerCase().replace(/[-_ \s]+/g, ""); }

        function handleSkuFuzzySearch() {
            const query = document.getElementById("skuSearchInput").value;
            const box = document.getElementById("skuDropdownContainer");
            if (masterProductsList.length === 0) return;

            const cleanQuery = normalizeSKU(query);
            const queryWords = query.trim().toLowerCase().split(/\s+/);

            const matches = masterProductsList.filter(sku => {
                const cleanSKU = normalizeSKU(sku);
                const rawSKU = sku.toLowerCase();
                if (cleanSKU.includes(cleanQuery)) return true;
                return queryWords.every(word => rawSKU.includes(word));
            }).slice(0, 20);

            if (matches.length === 0) {
                box.innerHTML = `<div class="search-item" style="color:#ef4444;">No SKU found</div>`;
            } else {
                box.innerHTML = matches.map(sku => `
                    <div class="search-item" onclick="selectSkuItem('${sku}')">${sku}</div>
                `).join('');
            }
            box.style.display = "block";
        }

        function selectSkuItem(sku) {
            document.getElementById("skuSearchInput").value = sku;
            document.getElementById("selectedSkuVal").value = sku;
            document.getElementById("skuDropdownContainer").style.display = "none";
        }

        function selectMode(mode) {
            currentMode = mode;
            document.getElementById("workPanel").style.display = "flex";
            document.getElementById("issueBtn").classList.remove("active-pickup");
            document.getElementById("receiveBtn").classList.remove("active-return");

            if (mode === "Issue") {
                document.getElementById("issueBtn").classList.add("active-pickup");
                document.getElementById("pendingCuttingWrapper").style.display = "none";
                document.getElementById("skuSearchInput").style.display = "block";
                document.getElementById("skuReadOnly").style.display = "none";
                document.getElementById("qtyLimitHint").style.display = "none";
            } else {
                document.getElementById("receiveBtn").classList.add("active-return");
                document.getElementById("pendingCuttingWrapper").style.display = "block";
                document.getElementById("skuSearchInput").style.display = "none";
                document.getElementById("skuReadOnly").style.display = "block";
            }
            resetFormFields();
        }

        async function handleLabourChange() {
            const labour = document.getElementById("labourSelect").value;
            resetFormFields();

            if (currentMode === "Receive" && labour) {
                showLoader();
                try {
                    const resp = await fetch(`${API_URL}?action=getCuttingLedger&name=${encodeURIComponent(labour)}`);
                    const data = await resp.json();
                    hideLoader();

                    if (data.success) {
                        masterPendingRows = (data.rows || []).filter(r => r.status === "Pending");
                        renderPendingCuttingList(masterPendingRows);
                    }
                } catch (e) { hideLoader(); }
            }
        }

        function renderPendingCuttingList(rows) {
            const container = document.getElementById("pendingCuttingBox");
            if (!rows || rows.length === 0) {
                container.innerHTML = `<div style="font-size: 12px; color: #ef4444; font-weight: 700; text-align: center; padding: 10px;">कोई पेंडिंग कटिंग नहीं है!</div>`;
                return;
            }

            container.innerHTML = rows.map((r, idx) => `
                <div class="pending-item-card" id="pendingCard_${idx}" onclick="selectPendingCuttingItem(${idx})">
                    <div>
                        <div style="font-size:12px; font-weight:800; color:#1e293b;">${r.sku}</div>
                        <div style="font-size:10px; color:#64748b;">Issued: ${r.date}</div>
                    </div>
                    <div style="font-size:13px; font-weight:800; color:#7c3aed;">${r.issuedQty} Pcs</div>
                </div>
            `).join('');
        }

        function selectPendingCuttingItem(index) {
            document.querySelectorAll('.pending-item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`pendingCard_${index}`).classList.add('selected');

            selectedPendingRow = masterPendingRows[index];

            document.getElementById("skuReadOnly").value = selectedPendingRow.sku;
            
            const qtyIn = document.getElementById("qtyInput");
            qtyIn.value = selectedPendingRow.issuedQty;
            qtyIn.max = selectedPendingRow.issuedQty;

            document.getElementById("maxQtyVal").innerText = selectedPendingRow.issuedQty;
            document.getElementById("qtyLimitHint").style.display = "block";
        }

        async function saveCuttingEntry() {
            const labour = document.getElementById("labourSelect").value;
            if (!labour) { toast("Select Labour Name"); return; }

            let sku = currentMode === "Issue" ? (document.getElementById("selectedSkuVal").value || document.getElementById("skuSearchInput").value) : document.getElementById("skuReadOnly").value;
            if (!sku) { toast("Select Product SKU"); return; }

            const qty = Number(document.getElementById("qtyInput").value);
            if (!qty || qty <= 0) { toast("Enter valid Quantity"); return; }

            if (currentMode === "Receive" && selectedPendingRow) {
                if (qty > Number(selectedPendingRow.issuedQty)) {
                    toast(`❌ Exceeded Issued Qty (${selectedPendingRow.issuedQty} Pcs max)`);
                    return;
                }
            }

            showLoader();

            try {
                let response;
                if (currentMode === "Issue") {
                    response = await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            action: "saveLabourTransaction",
                            payload: { labourName: labour, sku: sku, qty: qty, type: "Cutting" }
                        })
                    });
                } else {
                    response = await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            action: "processLabourPayment",
                            payload: { rowId: selectedPendingRow.rowId, receivedQty: qty }
                        })
                    });
                }

                const resData = await response.json();
                hideLoader();

                if (resData.success) {
                    toast(`🎉 Entry Saved (${currentMode})!`);
                    resetFormFields();
                    if (currentMode === "Receive") handleLabourChange();
                    fetchMasterTableData();
                } else { toast("Save Error: " + resData.message); }

            } catch (e) { hideLoader(); }
        }

        async function fetchMasterTableData() {
            try {
                const resp = await fetch(`${API_URL}?action=getCuttingLedger`);
                const data = await resp.json();

                if (data.success && data.rows) {
                    let rows = data.rows || [];

                    rows.sort((a, b) => {
                        if (a.status === "Pending" && b.status !== "Pending") return -1;
                        if (a.status !== "Pending" && b.status === "Pending") return 1;
                        return b.rowId - a.rowId;
                    });

                    document.getElementById("headerIssueCount").innerText = rows.filter(r => r.status === "Pending").length;
                    document.getElementById("headerReceiveCount").innerText = rows.filter(r => r.status === "Received").length;

                    renderMasterTable(rows);
                }
            } catch (e) {}
        }

        function renderMasterTable(rows) {
            const tbody = document.getElementById("masterTableBody");
            if (!rows || rows.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 15px; color: #94a3b8;">No records found</td></tr>`;
                return;
            }

            tbody.innerHTML = rows.slice(0, 30).map(r => `
                <tr>
                    <td style="color:#64748b;">${r.date}</td>
                    <td style="color:#0f172a; font-weight:700;">${r.labourName}</td>
                    <td style="color:#7c3aed; font-family:monospace">${r.sku}</td>
                    <td>${r.issuedQty}</td>
                    <td style="color:#059669;">${r.receivedQty}</td>
                    <td style="color:#ef4444;">${r.balanceQty}</td>
                    <td><span class="status-badge ${r.status === 'Received' ? 'badge-received' : 'badge-pending'}">${r.status}</span></td>
                </tr>
            `).join('');
        }

        function resetFormFields() {
            selectedPendingRow = null;
            document.getElementById("skuSearchInput").value = "";
            document.getElementById("selectedSkuVal").value = "";
            document.getElementById("skuReadOnly").value = "";
            document.getElementById("qtyInput").value = "";
            document.getElementById("qtyLimitHint").style.display = "none";
        }

        function stopWork() {
            currentMode = "";
            document.getElementById("workPanel").style.display = "none";
            document.getElementById("issueBtn").classList.remove("active-pickup");
            document.getElementById("receiveBtn").classList.remove("active-return");
            resetFormFields();
            toast("Process Reset");
        }

        function showLoader() { document.getElementById("loadingOverlay").style.display = "flex"; }
        function hideLoader() { document.getElementById("loadingOverlay").style.display = "none"; }
        function toast(msg) {
            const t = document.createElement("div");
            t.className = "toast"; t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }
    </script>
</body>

</html>
