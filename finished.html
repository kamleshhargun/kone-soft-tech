<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Harsidhi Ventures - Finished Goods Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, sans-serif }
        body { background: #f3f6fb; min-height: 100vh; padding: 20px; color: #1f2937; }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.01); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { background: #f8fafc; color: #475569; font-weight: 600; padding: 12px 14px; border-bottom: 1px solid #e2e8f0; }
        td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; }
        tr:hover { background: #f8fafc; }
        .badge-inward { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 6px; font-weight: 700; font-size: 11px; text-transform: uppercase; }
        #loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, .85); backdrop-filter: blur(4px); z-index: 99999; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #2563eb }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel" style="display:flex; justify-content:between; align-items:center; flex-wrap:wrap; gap:10px; border-left:5px solid #10b981;">
            <div style="flex:1;">
                <h2 style="color:#111827; font-size:18px;">✨ Finished Manufacturing Output Ledger</h2>
                <p style="font-size:12px; color:#64748b; margin-top:2px;">Live database stream tracking finished inventory garments matching Inward codes.</p>
            </div>
            <button class="badge-inward" style="border:none; cursor:pointer; padding:10px 16px; font-size:13px;" onclick="loadProductionHistory()">🔄 Refresh Logs</button>
        </div>
        <div class="panel" style="padding:0; overflow:hidden;">
            <table style="width:100%;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Labour Name</th>
                        <th>SKU Pattern</th>
                        <th>Production Qty</th>
                        <th>Piece Status</th>
                    </tr>
                </thead>
                <tbody id="finishedGoodsTableBody">
                    <tr><td colspan="5" style="text-align:center; padding:30px; color:gray; font-style:italic;">Querying finished records sequence...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <div id="loadingOverlay">Syncing Production Archives...</div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwlm0JdWgH7i930zgSVBhnMsuuq6rleHs02PLK6AkxOMz1DPd09EAejLZPjChyBvjZ4/exec";
        async function loadProductionHistory() {
            document.getElementById("loadingOverlay").style.display = "flex";
            try {
                // Fetching all transaction rows compiled under the global labour ledger system
                const response = await fetch(`${API_URL}?action=getLabourLedger&name=&date=`);
                const res = await response.json();
                document.getElementById("loadingOverlay").style.display = "none";
                
                const tbody = document.getElementById("finishedGoodsTableBody");
                // Filter only Inward work done entries (ignore plain cash advance vouchers)
                const inwardRows = (res.rows || []).filter(r => r.type === "Inward");
                
                if(inwardRows.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:25px; color:gray;">No documented inward manufacturing batches tracked yet.</td></tr>`;
                    return;
                }
                let html = "";
                inwardRows.forEach(r => {
                    html += `
                        <tr>
                            <td>${r.date}</td>
                            <td><b>${r.labourName}</b></td>
                            <td><code>${r.sku}</code></td>
                            <td style="font-weight:700; color:#166534;">+${r.qty} Pcs</td>
                            <td><span class="badge-inward">Added to Inventory</span></td>
                        </tr>`;
                });
                tbody.innerHTML = html;
            } catch(e) { document.getElementById("loadingOverlay").style.display = "none"; }
        }
        window.onload = function() { if(API_URL !== "YOUR_SPREADSHEET_WEB_APP_URL_HERE") loadProductionHistory(); }
    </script>
</body>
</html>
