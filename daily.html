<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Harsidhi Ventures Pickup Return System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, sans-serif }
        body { background: #f3f6fb; height: 100vh; overflow: hidden; color: #1f2937 }
        .header { height: 60px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #2563eb; border-bottom: 1px solid #e5e7eb; box-shadow: 0 1px 8px rgba(0, 0, 0, .05) }
        .main { height: calc(100vh - 60px); display: grid; grid-template-columns: 280px 1fr 340px; gap: 12px; padding: 12px }
        .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0, 0, 0, .05) }
        .panel-header { padding: 14px 16px; font-weight: 700; font-size: 15px; background: #fafbfc; border-bottom: 1px solid #eef2f7 }
        .left-content, .right-content { padding: 12px; overflow: auto }
        #dashboardArea { display: grid; gap: 10px; margin-bottom: 10px }
        .center-content { padding: 15px; display: flex; flex-direction: column; gap: 12px }
        .mode-row, .action-row { display: flex; gap: 10px }
        .mode-btn { flex: 1; height: 50px; border-radius: 12px; border: 2px solid; font-weight: 700; background: #fff; cursor: pointer; transition: .2s }
        .pickup { border-color: #2563eb; color: #2563eb }
        .return { border-color: #14b8a6; color: #14b8a6 }
        .active-pickup { background: #2563eb; color: #fff }
        .active-return { background: #14b8a6; color: #fff }
        .scan-panel { display: none; flex-direction: column; gap: 10px; padding: 14px; border: 1px solid #e5e7eb; border-radius: 14px; background: #fafcff }
        .input { height: 46px; padding: 0 14px; border: 1px solid #dbe2ea; border-radius: 12px; outline: none; background: #fff }
        .input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, .12) }
        #reader { display: none; width: 100%; overflow: hidden; border-radius: 12px; margin-bottom: 5px; }
        .result-card, .card { padding: 14px; border: 1px solid #e5e7eb; border-radius: 14px; background: #fff; box-shadow: 0 2px 8px rgba(0, 0, 0, .03) }
        .result-card { display: none; font-size: 13px; line-height: 1.5; }
        .btn { border: none; border-radius: 12px; padding: 11px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s; text-align: center; }
        .btn:hover { transform: translateY(-1px); opacity: .95 }
        .btn-camera { background: #2563eb; color: #fff }
        .btn-manual { background: #475569; color: #fff }
        .btn-save { background: #10b981; color: #fff }
        .btn-stop { background: #ef4444; color: #fff }
        .search-box { display: flex; flex-direction: column; gap: 10px; height: 100% }
        .search-result { flex: 1; overflow: auto; font-size: 13px }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111827; color: #fff; padding: 12px 16px; border-radius: 12px; z-index: 9999; box-shadow: 0 8px 20px rgba(0, 0, 0, .2) }
        .small-btn { padding: 8px 12px; font-size: 12px; min-height: 34px; width: auto }
        #loadingOverlay { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, .85); backdrop-filter: blur(4px); z-index: 99999; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #2563eb }
        @media(max-width:900px) { body { overflow: auto } .main { grid-template-columns: 1fr; height: auto } .panel { min-height: 350px } }
    </style>
</head>

<body>

    <div class="header">HARSIDHI VENTURES PICKUP RETURN SYSTEM</div>

    <div class="main">
        <!-- Left Panel: Dashboard -->
        <div class="panel">
            <div class="panel-header">Dashboard & Bulk Update</div>
            <div class="left-content">
                <div id="dashboardArea">Loading Dashboard...</div>
                <div class="card">
                    <h3>Bulk Update</h3>
                    <input type="date" id="bulkDate" style="width: 100%; margin: 8px 0; height: 36px; padding: 5px;">
                    <button class="btn btn-camera" style="width: 100%;" onclick="loadBulkCounts()">Load Counts</button>
                    <hr style="margin: 10px 0; border: 0; border-top: 1px solid #eee;">
                    <div id="bulkCounts">Pickup : 0<br>Return : 0</div>
                    <br>
                    <button id="pickupUpdateBtn" class="btn btn-save" style="width: 100%; margin-bottom: 5px;" onclick="startBulkUpdate('Pickup')">Update Pickup</button>
                    <button id="returnUpdateBtn" class="btn btn-save" style="width: 100%;" onclick="startBulkUpdate('Return')">Update Return</button>
                    <hr style="margin: 10px 0; border: 0; border-top: 1px solid #eee;">
                    <div id="bulkProgress">Waiting...</div>
                </div>
            </div>
        </div>

        <!-- Center Panel: Live Operation Work (Pickup/Return Features) -->
        <div class="panel">
            <div class="panel-header">Scan Operations</div>
            <div class="center-content">
                <div class="mode-row">
                    <button id="pickupBtn" class="mode-btn pickup" onclick="selectType('Pickup')">Pickup</button>
                    <button id="returnBtn" class="mode-btn return" onclick="selectType('Return')">Return</button>
                </div>

                <div id="scanPanel" class="scan-panel">
                    <div class="action-row">
                        <button class="btn btn-camera" style="flex: 1;" onclick="startCamera()">📷 Camera Scan</button>
                        <button class="btn btn-manual" style="flex: 1;" onclick="focusAWB()">⌨ Manual Input</button>
                    </div>
                    <div id="reader"></div>
                    <input id="awbInput" class="input" placeholder="Scan or Type AWB and press Enter">
                    <input id="orderInput" class="input" placeholder="Order ID (Manual Fallback)" style="display: none;">
                    
                    <div id="resultCard" class="result-card"></div>
                    
                    <div class="action-row" style="margin-top: 10px;">
                        <button class="btn btn-save" style="flex: 1;" onclick="saveEntry()">Next (Save)</button>
                        <button class="btn btn-stop" style="flex: 1;" onclick="stopWork()">Stop</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Panel: Search & Single Update -->
        <div class="panel">
            <div class="panel-header">Find Order</div>
            <div class="right-content">
                <div class="search-box">
                    <input id="searchInput" class="input" placeholder="Search AWB / Order ID">
                    <button class="btn btn-camera small-btn" onclick="searchOrder()">Search</button>
                    <div id="searchResult" class="search-result"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay">Loading...</div>

    <script>
        /* ===================================
        CONFIG
        =================================== */
        // Yahan par apna Google Web App URL paste karein
        const API_URL = "https://script.google.com/macros/s/AKfycbxoWaTIECKCVnljXiqLVIRRC8Orhlcvcih9eqT7J2wjIaJ5j94g97m0KI6A4GSEK2gN/exec"; 

        /* ===================================
        GLOBAL VARIABLES
        =================================== */
        let bulkRunning = false;
        let currentType = "";
        let currentTracking = null;
        let html5QrCode = null;
        let scannerBuffer = "";
        
        const beep = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

        /* ===================================
        TYPE SELECT (Pickup / Return Selection)
        =================================== */
        function selectType(type) {
            currentType = type;
            document.getElementById("scanPanel").style.display = "flex";
            document.getElementById("pickupBtn").classList.remove("active-pickup");
            document.getElementById("returnBtn").classList.remove("active-return");

            if (type === "Pickup") {
                document.getElementById("pickupBtn").classList.add("active-pickup");
            } else {
                document.getElementById("returnBtn").classList.add("active-return");
            }

            clearForm();
            focusAWB();
        }

        /* ===================================
        CLEAR FORM
        =================================== */
        function clearForm() {
            currentTracking = null;
            document.getElementById("awbInput").value = "";
            document.getElementById("orderInput").value = "";
            document.getElementById("orderInput").style.display = "none";
            document.getElementById("resultCard").style.display = "none";
            document.getElementById("resultCard").innerHTML = "";
        }

        function focusAWB() {
            document.getElementById("awbInput").focus();
        }

        /* ===================================
        CAMERA SCANNING FEATURES
        =================================== */
        async function startCamera() {
            try {
                if (html5QrCode) {
                    await stopCamera();
                }
                document.getElementById("reader").style.display = "block";
                html5QrCode = new Html5Qrcode("reader");
                
                await html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 20, qrbox: { width: 280, height: 140 } },
                    function(decodedText) {
                        document.getElementById("awbInput").value = decodedText;
                        playSuccessSound();
                        stopCamera();
                        trackShipment();
                    }
                );
            } catch (err) {
                toast("Camera Error or Permission Denied");
                console.error(err);
            }
        }

        async function stopCamera() {
            try {
                if (html5QrCode) {
                    await html5QrCode.stop();
                    await html5QrCode.clear();
                    html5QrCode = null;
                }
            } catch (err) {}
            document.getElementById("reader").style.display = "none";
        }

        /* ===================================
        MANUAL INPUT & BARCODE SCANNER
        =================================== */
        document.getElementById("awbInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                trackShipment();
            }
        });

        // Barcode / USB Hardware Scanner Listener
        document.addEventListener("keydown", function(e) {
            if (document.activeElement.id !== "awbInput") return;
            
            if (e.key === "Enter") {
                e.preventDefault();
                const awb = scannerBuffer.trim();
                if (awb.length > 5) {
                    document.getElementById("awbInput").value = awb;
                    trackShipment();
                }
                scannerBuffer = "";
                return;
            }

            if (e.key.length === 1) {
                scannerBuffer += e.key;
            }
        });

        /* ===================================
        TRACK SHIPMENT
        =================================== */
        async function trackShipment() {
            const awb = document.getElementById("awbInput").value.trim();
            if (!awb) {
                toast("Please Enter/Scan AWB");
                return;
            }

            showLoader();
            showResultLoading();

            try {
                const response = await fetch(`${API_URL}?action=trackShipment&awb=${encodeURIComponent(awb)}`);
                const result = await response.json();
                hideLoader();

                if (result && result.success) {
                    currentTracking = result;
                    renderTracking(result);
                } else {
                    openManualOrder();
                }
            } catch (err) {
                hideLoader();
                console.error(err);
                openManualOrder();
            }
        }

        function showResultLoading() {
            const card = document.getElementById("resultCard");
            card.style.display = "block";
            card.innerHTML = "<i>Fetching Live Tracking Data...</i>";
        }

        function openManualOrder() {
            currentTracking = null;
            const card = document.getElementById("resultCard");
            card.style.display = "block";
            card.innerHTML = `<div style="color:#dc2626; font-weight:600;">Tracking Not Found</div>
                              <div style="margin-top:8px;">Please enter Order ID manually below:</div>`;
            
            document.getElementById("orderInput").style.display = "block";
            document.getElementById("orderInput").focus();
        }

        function renderTracking(data) {
            const card = document.getElementById("resultCard");
            card.style.display = "block";
            card.innerHTML = `
                <b>AWB:</b> ${data.awb || ""}<br>
                <b>Order ID:</b> ${data.orderId || ""}<br>
                <b>Status:</b> ${data.status || ""}<br>
                <b>Courier:</b> ${data.courier || ""}<br>
                <b>Customer:</b> ${data.customerName || ""}<br>
                <b>City:</b> ${data.city || ""}
            `;
            document.getElementById("orderInput").value = data.orderId || "";
            document.getElementById("orderInput").style.display = "block";
        }

        /* ===================================
        SAVE ENTRY (POST OPERATION)
        =================================== */
        async function saveEntry() {
            if (!currentType) {
                toast("Select Pickup / Return Mode First");
                return;
            }

            const awb = document.getElementById("awbInput").value.trim();
            if (!awb) {
                toast("AWB Missing");
                return;
            }

            const orderId = document.getElementById("orderInput").value.trim();

            const payload = {
                type: currentType,
                awb: awb,
                orderId: orderId,
                courier: currentTracking?.courier || "MANUAL",
                status: currentTracking?.status || "Pending",
                customerName: currentTracking?.customerName || "",
                city: currentTracking?.city || "",
                state: currentTracking?.state || "",
                destination: currentTracking?.destination || "",
                pickupDate: currentTracking?.pickupDate || "",
                deliveredDate: currentTracking?.deliveredDate || "",
                expectedDate: currentTracking?.expectedDate || currentTracking?.estimatedDate || "",
                isRTO: currentTracking?.isRTO || false
            };

            showLoader();
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        action: "saveEntry",
                        payload: payload
                    })
                });

                const text = await response.text();
                let result = {};
                try {
                    result = JSON.parse(text);
                } catch (e) {
                    hideLoader();
                    toast("Invalid Server Response");
                    return;
                }

                hideLoader();

                if (result.duplicate) {
                    toast("❌ Duplicate AWB for this action!");
                    document.getElementById("awbInput").select();
                    return;
                }

                if (!result.success) {
                    toast(result.message || "Save Failed");
                    return;
                }

                playSuccessSound();
                toast("🎉 Saved Successfully!");
                clearForm();
                focusAWB();
                
                // Refresh dashboard components
                loadDashboard();
            } catch (err) {
                hideLoader();
                console.error(err);
                toast("Save Error: " + err.message);
            }
        }

        /* ===================================
        STOP WORK
        =================================== */
        function stopWork() {
            stopCamera();
            currentType = "";
            clearForm();
            document.getElementById("scanPanel").style.display = "none";
            document.getElementById("pickupBtn").classList.remove("active-pickup");
            document.getElementById("returnBtn").classList.remove("active-return");
            toast("Operation stopped");
        }

        /* ===================================
        DASHBOARD OPERATIONS
        =================================== */
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}?action=getDashboardCounts`);
                const data = await response.json();
                if (data.success) {
                    renderDashboard(data);
                }
            } catch (err) {
                console.error("Dashboard Load Error", err);
            }
        }

        function renderDashboard(data) {
            document.getElementById("dashboardArea").innerHTML = `
                <div class="card"><b>Today Pickup</b><h2>${data.todayPickup || 0}</h2></div>
                <div class="card"><b>Today Return</b><h2>${data.todayReturn || 0}</h2></div>
                <div class="card"><b>Yesterday Pickup</b><h2>${data.yesterdayPickup || 0}</h2></div>
                <div class="card"><b>Yesterday Return</b><h2>${data.yesterdayReturn || 0}</h2></div>
                <div class="card"><b>${data.monthName || 'Month'} Pickup</b><h2>${data.monthPickup || 0}</h2></div>
                <div class="card"><b>${data.monthName || 'Month'} Return</b><h2>${data.monthReturn || 0}</h2></div>
                <div id="recentArea"></div>
            `;
            loadRecentRecords();
        }

        async function loadRecentRecords() {
            try {
                const response = await fetch(`${API_URL}?action=getRecentRecords`);
                const data = await response.json();
                if (data.success && data.rows) {
                    renderRecent(data.rows);
                }
            } catch (err) {}
        }

        function renderRecent(rows) {
            const box = document.getElementById("recentArea");
            if (!box) return;
            let html = `<div class="card" style="background:#f8fafc; margin-top:10px;"><b>Recent 5 Scans</b></div>`;
            const subset = rows.slice(0, 5); // display top 5 latest
            subset.forEach(r => {
                html += `
                    <div class="card" style="font-size:12px; margin-top:4px;">
                        <b>${r.awb}</b> [${r.type}]<br>
                        Status: ${r.status || "N/A"}<br>
                        <span style="color:gray; font-size:10px;">${r.date}</span>
                    </div>`;
            });
            box.innerHTML = html;
        }

        /* ===================================
        FIND / SEARCH ORDER
        =================================== */
        async function searchOrder() {
            const keyword = document.getElementById("searchInput").value.trim();
            if (!keyword) {
                toast("Enter AWB or Order ID");
                return;
            }

            const resultBox = document.getElementById("searchResult");
            resultBox.innerHTML = "Searching...";

            try {
                const response = await fetch(`${API_URL}?action=searchOrder&keyword=${encodeURIComponent(keyword)}`);
                const data = await response.json();

                if (!data.success) {
                    resultBox.innerHTML = "<div class='card'>No Record Found</div>";
                    return;
                }

                resultBox.innerHTML = `
                    <div class="card" style="margin-top:10px;">
                        <b>AWB:</b> ${data.awb}<br>
                        <b>Order:</b> ${data.orderId}<br>
                        <b>Type:</b> ${data.type}<br>
                        <b>Status:</b> ${data.status}<br>
                        <b>Courier:</b> ${data.courier || "N/A"}<br>
                        <b>Customer:</b> ${data.customer || "N/A"}<br>
                        <b>City:</b> ${data.city || "N/A"}<br>
                        <button class="btn btn-camera small-btn" style="width:100%; margin-top:8px;" onclick="updateSingleAWBSheet('${data.awb}')">Sync Sheet Status</button>
                    </div>`;
            } catch (err) {
                resultBox.innerHTML = "Error during search";
            }
        }

        async function updateSingleAWBSheet(awb) {
            showLoader();
            try {
                const response = await fetch(`${API_URL}?action=updateSingleAWB&awb=${encodeURIComponent(awb)}`);
                const result = await response.json();
                hideLoader();
                if (result.success) {
                    toast(result.skipped ? `Skipped: Locked (${result.reason})` : "Sheet Row Updated!");
                    searchOrder();
                } else {
                    toast(result.message || "Update Failed");
                }
            } catch (err) {
                hideLoader();
                toast("Sync Error");
            }
        }

        /* ===================================
        BULK UPDATE LOGIC
        =================================== */
        function formatInputDate(dateStr) {
            if (!dateStr) return "";
            const d = new Date(dateStr);
            const dd = String(d.getDate()).padStart(2, "0");
            const mm = String(d.getMonth() + 1).padStart(2, "0");
            const yyyy = d.getFullYear();
            return `${dd}/${mm}/${yyyy}`;
        }

        async function loadBulkCounts() {
            const date = document.getElementById("bulkDate").value;
            if (!date) {
                toast("Select Date first");
                return;
            }
            showLoader();
            try {
                const formatted = formatInputDate(date);
                const response = await fetch(`${API_URL}?action=getBulkCounts&date=${encodeURIComponent(formatted)}`);
                const data = await response.json();
                hideLoader();
                document.getElementById("bulkCounts").innerHTML = `Pickup : ${data.pickup || 0}<br>Return : ${data.return || 0}`;
            } catch (e) {
                hideLoader();
                toast("Error loading counts");
            }
        }

        async function startBulkUpdate(type) {
            if (bulkRunning) {
                toast("Another bulk operation is currently running");
                return;
            }

            const date = document.getElementById("bulkDate").value;
            if (!date) {
                toast("Select Date first");
                return;
            }

            bulkRunning = true;
            document.getElementById("pickupUpdateBtn").disabled = true;
            document.getElementById("returnUpdateBtn").disabled = true;

            try {
                const formatted = formatInputDate(date);
                document.getElementById("bulkProgress").innerHTML = "Fetching keys...";
                
                const response = await fetch(`${API_URL}?action=getBulkRows&date=${encodeURIComponent(formatted)}&type=${encodeURIComponent(type)}`);
                const result = await response.json();
                const rows = result.rows || [];

                if (rows.length === 0) {
                    document.getElementById("bulkProgress").innerHTML = "No processing rows found.";
                    return;
                }

                let updated = 0;
                let failed = 0;

                for (let i = 0; i < rows.length; i++) {
                    document.getElementById("bulkProgress").innerHTML = `${i + 1} / ${rows.length} Syncing AWB...`;
                    try {
                        const res = await fetch(`${API_URL}?action=updateSingleAWB&awb=${encodeURIComponent(rows[i].awb)}`);
                        const statusData = await res.json();
                        if (statusData.success) updated++; else failed++;
                    } catch (e) {
                        failed++;
                    }
                }

                document.getElementById("bulkProgress").innerHTML = `✅ Done<br>Updated: ${updated}<br>Failed: ${failed}`;
                loadDashboard();
            } catch (err) {
                document.getElementById("bulkProgress").innerHTML = "Bulk Process Failed";
            } finally {
                bulkRunning = false;
                document.getElementById("pickupUpdateBtn").disabled = false;
                document.getElementById("returnUpdateBtn").disabled = false;
            }
        }

        /* ===================================
        UTILITIES
        =================================== */
        function showLoader() { document.getElementById("loadingOverlay").style.display = "flex"; }
        function hideLoader() { document.getElementById("loadingOverlay").style.display = "none"; }
        function playSuccessSound() { try { beep.currentTime = 0; beep.play(); } catch (err) {} }
        function toast(msg) {
            const t = document.createElement("div");
            t.className = "toast"; t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        window.onload = function() {
            if(API_URL !== "YOUR_SPREADSHEET_WEB_APP_URL_HERE") {
                loadDashboard();
            } else {
                document.getElementById("dashboardArea").innerHTML = "<b style='color:red;'>Please configure API_URL in code!</b>";
            }
        };
    </script>
</body>
</html>
