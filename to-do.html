<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Daily To-Do Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    .pulse-urgent {
      animation: pulse-red 1.5s infinite;
    }
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen pb-24 sm:pb-8">

  <!-- USER SELECTION MODAL -->
  <div id="userModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl text-center">
      <div class="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-3 text-2xl">
        <i class="fa-solid fa-users"></i>
      </div>
      <h2 class="text-xl font-black text-slate-800">Who is using ERP right now?</h2>
      <p class="text-xs text-slate-500 mb-6">कृपया अपना नाम चुनें ताकि काम का रिकॉर्ड सही रहे:</p>
      
      <div class="grid grid-cols-1 gap-3">
        <button onclick="selectUser('Esha')" class="w-full py-3.5 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-bold rounded-xl shadow-lg hover:opacity-95 transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-user-ninja"></i> Esha
        </button>
        <button onclick="selectUser('Naresh')" class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-xl shadow-lg hover:opacity-95 transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-user-tie"></i> Naresh
        </button>
        <button onclick="selectUser('Kamlesh')" class="w-full py-3.5 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold rounded-xl shadow-lg hover:opacity-95 transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-user-gear"></i> Kamlesh
        </button>
      </div>
    </div>
  </div>

  <!-- URGENT ALARM TOP BANNER -->
  <div id="urgentBanner" class="hidden bg-red-600 text-white px-4 py-2.5 shadow-md flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-2 text-xs sm:text-sm font-bold">
      <span class="w-3 h-3 bg-white rounded-full animate-ping"></span>
      <i class="fa-solid fa-triangle-exclamation text-amber-300"></i>
      <span>URGENT CORRECTION PENDING!</span>
    </div>
    <button onclick="playBuzz()" class="bg-red-800 text-white text-xs px-3 py-1 rounded-lg font-bold border border-red-400 hover:bg-red-700 transition">
      <i class="fa-solid fa-volume-high"></i> BUZZ TEST
    </button>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div class="max-w-4xl mx-auto p-3 sm:p-6">
    
    <!-- APP HEADER -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-4 flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center font-bold text-xl">
          <i class="fa-solid fa-list-check"></i>
        </div>
        <div>
          <h1 class="text-lg font-extrabold text-slate-800 leading-tight">ERP Order Correction To-Do</h1>
          <p class="text-xs text-slate-400 font-semibold">Daily Order Corrections & Tasks</p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <div onclick="openUserModal()" class="bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-xl border border-slate-200 text-xs font-bold text-slate-700 flex items-center gap-2 cursor-pointer transition">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
          <span id="activeUserName">...</span>
          <i class="fa-solid fa-chevron-down text-[10px] text-slate-400"></i>
        </div>
        
        <button onclick="loadTasks()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 p-2 rounded-xl text-xs font-bold transition" title="Refresh">
          <i class="fa-solid fa-rotate"></i>
        </button>
      </div>
    </div>

    <!-- QUICK STATS CARDS -->
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="bg-white p-3.5 rounded-2xl border border-slate-200 shadow-sm text-center">
        <p class="text-[11px] font-bold text-slate-400 uppercase">Pending</p>
        <h3 id="countPending" class="text-2xl font-black text-amber-500">0</h3>
      </div>
      <div id="urgentCard" class="bg-white p-3.5 rounded-2xl border border-slate-200 shadow-sm text-center">
        <p class="text-[11px] font-bold text-slate-400 uppercase">Urgent 🚨</p>
        <h3 id="countUrgent" class="text-2xl font-black text-red-600">0</h3>
      </div>
      <div class="bg-white p-3.5 rounded-2xl border border-slate-200 shadow-sm text-center">
        <p class="text-[11px] font-bold text-slate-400 uppercase">Done Today</p>
        <h3 id="countDone" class="text-2xl font-black text-emerald-600">0</h3>
      </div>
    </div>

    <!-- DESKTOP INPUT FORM & TAB ROW -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      
      <!-- TAB SWITCHER -->
      <div class="md:col-span-2 bg-slate-200/80 p-1 rounded-xl flex text-xs font-bold h-12 items-center">
        <button onclick="switchTab('pending')" id="tabPending" class="flex-1 h-full rounded-lg bg-white text-indigo-600 shadow-sm transition">
          Pending Tasks
        </button>
        <button onclick="switchTab('done')" id="tabDone" class="flex-1 h-full rounded-lg text-slate-500 transition">
          Completed Tasks
        </button>
      </div>

      <!-- ADD BUTTON FOR DESKTOP -->
      <button onclick="toggleAddModal(true)" class="hidden sm:flex bg-indigo-600 hover:bg-indigo-700 text-white py-3 px-4 rounded-xl shadow-md font-bold text-xs items-center justify-center gap-2 transition">
        <i class="fa-solid fa-plus text-sm"></i> Add Correction Task
      </button>

    </div>

    <!-- TASK LIST CONTAINER -->
    <div id="taskList" class="space-y-3">
      <div class="text-center py-12 text-slate-400">
        <i class="fa-solid fa-spinner fa-spin text-3xl mb-2"></i>
        <p class="text-xs">Connecting & Fetching Tasks...</p>
      </div>
    </div>

  </div>

  <!-- FLOATING BOTTOM ADD BUTTON (FOR MOBILE VIEW ONLY) -->
  <div class="sm:hidden fixed bottom-4 left-0 right-0 px-4 z-30">
    <button onclick="toggleAddModal(true)" class="w-full bg-indigo-600 text-white py-3.5 rounded-2xl shadow-xl font-extrabold text-sm flex items-center justify-center gap-2">
      <i class="fa-solid fa-plus"></i> Add Correction Task
    </button>
  </div>

  <!-- ADD TASK MODAL (RESPONSIVE) -->
  <div id="addModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center hidden">
    <div class="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl p-5 shadow-2xl space-y-3">
      <div class="flex justify-between items-center border-b pb-2">
        <h3 class="text-base font-extrabold text-slate-800"><i class="fa-solid fa-plus-circle text-indigo-600"></i> New Correction Task</h3>
        <button onclick="toggleAddModal(false)" class="text-slate-400 text-lg hover:text-slate-600 px-2">&times;</button>
      </div>

      <form id="addTodoForm" onsubmit="handleAddTask(event)" class="space-y-3">
        <div>
          <label class="text-[11px] font-bold text-slate-500">Order ID / Title</label>
          <input type="text" id="taskTitle" required placeholder="e.g. #1089 Address / Size Change" class="w-full mt-1 px-3 py-2.5 bg-slate-50 border border-slate-300 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div>
          <label class="text-[11px] font-bold text-slate-500">Priority Level</label>
          <select id="taskPriority" class="w-full mt-1 px-3 py-2.5 bg-slate-50 border border-slate-300 rounded-xl text-sm font-bold text-slate-700 outline-none">
            <option value="Normal">Normal Task</option>
            <option value="Urgent" class="text-red-600">Urgent 🚨 (Immediate Alert)</option>
          </select>
        </div>

        <div>
          <label class="text-[11px] font-bold text-slate-500">Note / Instructions</label>
          <textarea id="taskDetails" rows="2" placeholder="Mention specific details like SKU, size, or mobile..." class="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-300 rounded-xl text-sm outline-none"></textarea>
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl text-sm shadow-md transition">
          Save & Sync
        </button>
      </form>
    </div>
  </div>

  <script>
    // ===================================================
    // APPS SCRIPT EXECUTION URL
    // ===================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnEMJrr6EE22FKoSRwXUBIiWT7CPZYy6lJlF5szWyXpgCAOhNet6z50kFQjR0REqyM/exec"; 

    let currentUser = localStorage.getItem("erp_todo_user") || "";
    let allTasks = [];
    let currentTab = "pending";

    window.onload = function() {
      if ("Notification" in window && Notification.permission !== "granted") {
        Notification.requestPermission();
      }

      if (!currentUser) {
        openUserModal();
      } else {
        document.getElementById("activeUserName").innerText = currentUser;
        loadTasks();
      }
      
      setInterval(loadTasks, 15000);
    };

    function selectUser(name) {
      currentUser = name;
      localStorage.setItem("erp_todo_user", name);
      document.getElementById("activeUserName").innerText = name;
      document.getElementById("userModal").classList.add("hidden");
      loadTasks();
    }

    function openUserModal() {
      document.getElementById("userModal").classList.remove("hidden");
    }

    function toggleAddModal(show) {
      document.getElementById("addModal").classList.toggle("hidden", !show);
    }

    function playBuzz() {
      try {
        if ("vibrate" in navigator) navigator.vibrate([200, 100, 200, 100, 400]);
        
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
      } catch (e) {}
    }

    async function loadTasks() {
      if (SCRIPT_URL === "YOUR_SCRIPT_URL_HERE") {
        document.getElementById("taskList").innerHTML = `
          <div class="bg-red-50 text-red-600 p-4 rounded-xl text-center text-xs font-bold border border-red-200">
            ⚠️ Setup Error: Please replace 'YOUR_SCRIPT_URL_HERE' in HTML code with your actual Apps Script Web App URL.
          </div>`;
        return;
      }

      try {
        const resp = await fetch(`${SCRIPT_URL}?action=getTodoList`);
        const data = await resp.json();
        if (data.success) {
          allTasks = data.tasks;
          renderTasks();
        }
      } catch (e) {
        console.error("Error loading tasks", e);
      }
    }

    function renderTasks() {
      const container = document.getElementById("taskList");
      let filtered = allTasks.filter(t => currentTab === "pending" ? t.status === "Pending" : t.status === "Done");

      const pendingCount = allTasks.filter(t => t.status === "Pending").length;
      const urgentCount = allTasks.filter(t => t.status === "Pending" && t.priority === "Urgent").length;
      const doneCount = allTasks.filter(t => t.status === "Done").length;
      
      document.getElementById("countPending").innerText = pendingCount;
      document.getElementById("countUrgent").innerText = urgentCount;
      document.getElementById("countDone").innerText = doneCount;

      const banner = document.getElementById("urgentBanner");
      const urgentCard = document.getElementById("urgentCard");
      if (urgentCount > 0) {
        banner.classList.remove("hidden");
        urgentCard.classList.add("pulse-urgent", "bg-red-50", "border-red-300");
      } else {
        banner.classList.add("hidden");
        urgentCard.classList.remove("pulse-urgent", "bg-red-50", "border-red-300");
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-2xl p-8 text-center border border-slate-200">
            <i class="fa-solid fa-circle-check text-slate-300 text-4xl mb-2"></i>
            <p class="text-slate-500 text-xs font-bold">No ${currentTab} tasks found!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(t => `
        <div class="bg-white rounded-2xl border ${t.priority === 'Urgent' && t.status === 'Pending' ? 'border-red-400 bg-red-50/40 pulse-urgent' : 'border-slate-200'} p-4 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          
          <div class="flex-1">
            <div class="flex items-center gap-2">
              ${t.priority === 'Urgent' ? '<span class="bg-red-600 text-white text-[9px] px-2 py-0.5 rounded font-black tracking-wider">URGENT</span>' : ''}
              <h3 class="font-bold text-slate-800 text-sm sm:text-base ${t.status === 'Done' ? 'line-through text-slate-400' : ''}">${escapeHtml(t.title)}</h3>
            </div>
            ${t.details ? `<p class="text-xs text-slate-600 mt-1 bg-slate-50 p-2 rounded-xl border border-slate-100">${escapeHtml(t.details)}</p>` : ''}
            
            <div class="flex items-center gap-4 mt-2 text-[10px] text-slate-400">
              <span><i class="fa-solid fa-user text-slate-400"></i> Added by: <b>${t.createdBy}</b> (${t.createdAt})</span>
              ${t.status === 'Done' ? `<span class="text-emerald-600 font-bold"><i class="fa-solid fa-check"></i> Done by ${t.completedBy}</span>` : ''}
            </div>
          </div>

          <div class="flex items-center gap-2 self-end sm:self-center">
            ${t.status === 'Pending' ? `
              <button onclick="toggleStatus('${t.taskId}', 'Done')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-xl font-bold text-xs shadow-sm flex items-center gap-1 transition">
                <i class="fa-solid fa-check"></i> Complete
              </button>
            ` : `
              <button onclick="toggleStatus('${t.taskId}', 'Pending')" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-xl font-bold text-xs transition">
                Reopen
              </button>
            `}
            <button onclick="deleteTask('${t.taskId}')" class="text-slate-300 hover:text-red-500 p-1 text-xs transition">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>

        </div>
      `).join('');
    }

    async function handleAddTask(e) {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerText = "Saving...";

      const payload = {
        action: "addTodoTask",
        payload: {
          createdBy: currentUser,
          title: document.getElementById("taskTitle").value.trim(),
          priority: document.getElementById("taskPriority").value,
          details: document.getElementById("taskDetails").value.trim()
        }
      };

      try {
        const resp = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        const res = await resp.json();
        if (res.success) {
          document.getElementById("addTodoForm").reset();
          toggleAddModal(false);
          loadTasks();
        }
      } catch (err) {
        alert("Error saving task");
      } finally {
        btn.disabled = false;
        btn.innerText = "Save & Sync";
      }
    }

    async function toggleStatus(taskId, status) {
      try {
        const resp = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ action: "updateTodoStatus", taskId: taskId, status: status, userName: currentUser })
        });
        const res = await resp.json();
        if (res.success) {
          if (status === 'Done') playBuzz();
          loadTasks();
        }
      } catch (err) {
        alert("Error updating status");
      }
    }

    async function deleteTask(taskId) {
      if (!confirm("Delete this task?")) return;
      try {
        const resp = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ action: "deleteTodoTask", taskId: taskId })
        });
        const res = await resp.json();
        if (res.success) loadTasks();
      } catch (e) {
        alert("Error deleting task");
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById("tabPending").className = tab === 'pending' ? 'flex-1 h-full rounded-lg bg-white text-indigo-600 shadow-sm transition' : 'flex-1 h-full rounded-lg text-slate-500 transition';
      document.getElementById("tabDone").className = tab === 'done' ? 'flex-1 h-full rounded-lg bg-white text-indigo-600 shadow-sm transition' : 'flex-1 h-full rounded-lg text-slate-500 transition';
      renderTasks();
    }

    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
