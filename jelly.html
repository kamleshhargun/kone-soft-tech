<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jelly Glass Banner Creator</title>
  <!-- Google Fonts से प्रीमियम और रेकमेंडेड फोंट्स लोड करना -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@600;700&family=Inter:wght@600;700&family=Montserrat:wght@600;700&family=Oswald:wght@600&family=Plus+Jakarta+Sans:wght@600;700&family=Poppins:wght@600;700&family=Rubik:wght@600;700&family=Urbanist:wght@600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .creator-container {
      width: 100%;
      max-width: 900px;
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin-top: 0;
      color: #121212;
    }

    .size-selector {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .size-btn {
      padding: 12px 30px;
      font-size: 15px;
      font-weight: 600;
      border: 2px solid #121212;
      background: transparent;
      color: #121212;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .size-btn.active {
      background: #121212;
      color: #ffffff;
    }

    .control-panel {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    select.font-dropdown {
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #fff;
      cursor: pointer;
      color: #121212;
    }

    input[type="file"] {
      flex: 1;
      padding: 10px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
    }

    .url-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .url-row input[type="text"] {
      flex: 1;
    }

    .action-btn {
      background: #121212;
      color: #fff;
      border: none;
      padding: 0 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .action-btn:hover {
      background: #333;
    }

    .customise-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      border-top: 1px solid #e0e0e0;
      padding-top: 15px;
    }

    .panel-editor {
      background: #f1f1f1;
      padding: 12px;
      border-radius: 8px;
    }

    .panel-editor h4 {
      margin: 0 0 10px 0;
      color: #555;
    }

    .feature-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .input-icon { width: 45px; text-align: center; }
    .input-text { flex: 1; }

    .preview-area {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    .banner-frame {
      position: relative;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      background: #eaeaea;
      transition: all 0.3s ease;
    }

    .banner-frame.ratio-9-16 {
      max-width: 400px;
      aspect-ratio: 9/16;
    }

    .banner-frame.ratio-1-1 {
      max-width: 500px;
      aspect-ratio: 1/1;
    }

    .banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .banner-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      box-sizing: border-box;
      z-index: 3;
    }

    .ratio-1-1 .banner-overlay {
      align-items: flex-end;
      padding-bottom: 25px;
    }

    .glass-column {
      width: 26%; 
      height: 85%; 
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 24px;
      padding: 15px 5px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      transition: all 0.3s ease;
    }

    .ratio-1-1 .glass-column {
      height: 65%;
      width: 28%;
    }

    .feature-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 4px;
      width: 100%;
    }

    .feature-icon {
      font-size: 24px;
      line-height: 1;
    }

    .feature-text {
      color: #000000;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      word-break: break-word;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .ratio-1-1 .feature-text {
      font-size: 12px;
    }

    .export-zone {
      display: flex;
      justify-content: center;
      margin-top: 25px;
    }

    .download-btn {
      min-width: 250px;
      background: #121212;
      color: #ffffff;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .download-btn:hover {
      background: #333333;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.1/html-to-image.min.js"></script>
</head>
<body>

  <div class="creator-container">
    <h2>Jelly Glass Studio Banner</h2>

    <div class="size-selector">
      <button class="size-btn active" id="btn-story">Story Size (9:16)</button>
      <button class="size-btn" id="btn-square">Square Size (1:1)</button>
    </div>

    <div class="control-panel">
      
      <div class="input-group">
        <label>🎯 Choose Master Font Style (Meta Ads & Theme Recommended):</label>
        <select class="font-dropdown" id="master-font-picker">
          <option value="'Plus Jakarta Sans', sans-serif" selected>Plus Jakarta Sans (Horizon Theme Clean Look)</option>
          <option value="'Inter', sans-serif">Inter (Highly Recommended for Meta Ads)</option>
          <option value="'Urbanist', sans-serif">Urbanist (Premium Fashion & Modern Luxury)</option>
          <option value="'Montserrat', sans-serif">Montserrat (Bold E-commerce Text Style)</option>
          <option value="'Poppins', sans-serif">Poppins (Super Clean & Trendy Instagram Look)</option>
          <option value="'Arimo', sans-serif">Arimo (Classic Facebook Standard Ad Font)</option>
          <option value="'Rubik', sans-serif">Rubik (Smooth Rounded High-Converting Font)</option>
          <option value="'Oswald', sans-serif">Oswald (Narrow Bold Impact Look)</option>
        </select>
      </div>

      <!-- अपलोड के पास भी लोड बटन जोड़ा गया है -->
      <div class="input-group">
        <label>1. Upload from Device (PC / Mobile Gallery):</label>
        <div class="url-row">
          <input type="file" id="local-file" accept="image/*">
          <button class="action-btn" id="load-file-btn">Load Image</button>
        </div>
      </div>
      
      <div class="input-group">
        <label>OR 2. Load from Image URL:</label>
        <div class="url-row">
          <input type="text" id="web-url" placeholder="https://example.com/image.jpg">
          <button class="action-btn" id="load-url-btn">Load URL</button>
        </div>
      </div>

      <div class="customise-grid">
        <div class="panel-editor">
          <h4>Left Glass Pillar Features</h4>
          <div class="feature-row">
            <input type="text" class="input-icon" id="edit-l1-icon" value="🧵" placeholder="Icon">
            <input type="text" class="input-text" id="edit-l1-text" value="100% Cotton Flex" placeholder="Text">
          </div>
          <div class="feature-row">
            <input type="text" class="input-icon" id="edit-l2-icon" value="📭" placeholder="Icon">
            <input type="text" class="input-text" id="edit-l2-text" value="Two Deep Pockets" placeholder="Text">
          </div>
          <div class="feature-row">
            <input type="text" class="input-icon" id="edit-l3-icon" value="👗" placeholder="Icon">
            <input type="text" class="input-text" id="edit-l3-text" value="Flowy A-Line" placeholder="Text">
          </div>
        </div>

        <div class="panel-editor">
          <h4>Right Glass Pillar Features</h4>
          <div class="feature-row">
            <input type="text" class="input-icon" id="edit-r1-icon" value="🔄" placeholder="Icon">
            <input type="text" class="input-text" id="edit-r1-text" value="Easy Exchange" placeholder="Text">
          </div>
          <div class="feature-row">
            <input type="text" class="input-icon" id="edit-r2-icon" value="🏪" placeholder="Icon">
            <input type="text" class="input-text" id="edit-r2-text" value="COD Available" placeholder="Text">
          </div>
          <div class="feature-row">
            <input type="text" class="input-icon" id="edit-r3-icon" value="✦" placeholder="Icon">
            <input type="text" class="input-text" id="edit-r3-text" value="Premium Fabric" placeholder="Text">
          </div>
        </div>
      </div>
    </div>

    <div class="preview-area">
      <div class="banner-frame ratio-9-16" id="capture-frame">
        <img 
          src="https://images.unsplash.com/photo-1606787366850-de6330128bfc?q=80&w=1200" 
          alt="Canvas Asset" 
          class="banner-img" 
          id="main-image"
          crossorigin="anonymous"
        >

        <div class="banner-overlay">
          <div class="glass-column">
            <div class="feature-item">
              <span class="feature-icon" id="view-l1-icon">🧵</span>
              <span class="feature-text" id="view-l1-text">100% Cotton Flex</span>
            </div>
            <div class="feature-item">
              <span class="feature-icon" id="view-l2-icon">📭</span>
              <span class="feature-text" id="view-l2-text">Two Deep Pockets</span>
            </div>
            <div class="feature-item">
              <span class="feature-icon" id="view-l3-icon">👗</span>
              <span class="feature-text" id="view-l3-text">Flowy A-Line</span>
            </div>
          </div>

          <div class="glass-column">
            <div class="feature-item">
              <span class="feature-icon" id="view-r1-icon">🔄</span>
              <span class="feature-text" id="view-r1-text">Easy Exchange</span>
            </div>
            <div class="feature-item">
              <span class="feature-icon" id="view-r2-icon">🏪</span>
              <span class="feature-text" id="view-r2-text">COD Available</span>
            </div>
            <div class="feature-item">
              <span class="feature-icon" id="view-r3-icon">✦</span>
              <span class="feature-text" id="view-r3-text">Premium Fabric</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="export-zone">
      <button class="download-btn" id="download-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Save / Share Asset
      </button>
    </div>
  </div>

  <script>
    const btnStory = document.getElementById('btn-story');
    const btnSquare = document.getElementById('btn-square');
    const frame = document.getElementById('capture-frame');
    const mainImage = document.getElementById('main-image');
    const localFile = document.getElementById('local-file');
    const loadFileBtn = document.getElementById('load-file-btn');
    const webUrl = document.getElementById('web-url');
    const loadUrlBtn = document.getElementById('load-url-btn');
    const downloadBtn = document.getElementById('download-btn');
    const masterFontPicker = document.getElementById('master-font-picker');

    // अस्थायी तौर पर चुनी हुई फाइल स्टोर करने के लिए वेरिएबल
    let targetFile = null;

    localFile.addEventListener('change', (e) => {
      targetFile = e.target.files[0];
    });

    // अपलोड के पास वाले बटन से इमेज लोड करना
    loadFileBtn.addEventListener('click', () => {
      if (targetFile) {
        const reader = new FileReader();
        reader.onload = (event) => {
          mainImage.src = event.target.result;
        };
        reader.readAsDataURL(targetFile);
      } else {
        alert("Please select a file first using the 'Choose File' button.");
      }
    });

    masterFontPicker.addEventListener('change', () => {
      const selectedFont = masterFontPicker.value;
      const allTextElements = document.querySelectorAll('.feature-text');
      allTextElements.forEach(el => {
        el.style.fontFamily = selectedFont;
      });
    });

    const fields = ['l1', 'l2', 'l3', 'r1', 'r2', 'r3'];
    fields.forEach(field => {
      const iconInput = document.getElementById(`edit-${field}-icon`);
      const textInput = document.getElementById(`edit-${field}-text`);
      const iconView = document.getElementById(`view-${field}-icon`);
      const textView = document.getElementById(`view-${field}-text`);

      iconInput.addEventListener('input', () => iconView.textContent = iconInput.value);
      textInput.addEventListener('input', () => textView.textContent = textInput.value);
    });

    btnStory.addEventListener('click', () => {
      btnSquare.classList.remove('active');
      btnStory.classList.add('active');
      frame.classList.remove('ratio-1-1');
      frame.classList.add('ratio-9-16');
    });

    btnSquare.addEventListener('click', () => {
      btnStory.classList.remove('active');
      btnSquare.classList.add('active');
      frame.classList.remove('ratio-9-16');
      frame.classList.add('ratio-1-1');
    });

    loadUrlBtn.addEventListener('click', () => {
      const url = webUrl.value.trim();
      if (url) {
        mainImage.removeAttribute('crossorigin');
        mainImage.setAttribute('crossorigin', 'anonymous');
        mainImage.src = url;
      }
    });

    downloadBtn.addEventListener('click', async () => {
      const originalText = downloadBtn.textContent;
      downloadBtn.innerText = "Exporting High-Res...";
      downloadBtn.disabled = true;

      const config = { quality: 0.99, pixelRatio: 3 };

      try {
        const dataUrl = await htmlToImage.toJpeg(frame, config);
        const res = await fetch(dataUrl);
        const blob = await res.blob();
        const currentSizeName = frame.classList.contains('ratio-1-1') ? 'square' : 'story';
        const file = new File([blob], `jelly-banner-${currentSizeName}.jpg`, { type: 'image/jpeg' });

        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: 'My Studio Banner' });
        } else {
          const downloadLink = document.createElement('a');
          downloadLink.download = `jelly-glass-${currentSizeName}-${Date.now()}.jpg`;
          downloadLink.href = dataUrl;
          downloadLink.click();
        }
      } catch (err) {
        console.error("Export Error: ", err);
        alert("Export complete. Direct uploads work natively. Image links need CORS access to export correctly.");
      } finally {
        downloadBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Save / Share Asset`;
        downloadBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
